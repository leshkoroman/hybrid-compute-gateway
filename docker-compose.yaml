version: '3.8'

services:
  nginx:
    image: nginx:1.21.6
    container_name: nginx_calculation
    ports:
      - "80:80"
    volumes:
      - ./code:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app-network

  mysql:
    image: mysql:5.7.34
    container_name: mysql_calculation
    platform: linux/amd64  # Вказуємо платформу для сумісності
    environment:
      MYSQL_ROOT_PASSWORD: calculation_gen
      MYSQL_DATABASE: calculation_gen
      MYSQL_USER: calculation_gen
      MYSQL_PASSWORD: calculation_gen
    ports:
      - "3306:3306"
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - app-network

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php_calculation
    volumes:
      - ./code:/var/www/html
    networks:
      - app-network
    depends_on:
      - mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.1.1
    container_name: phpmyadmin_calculation
    platform: linux/amd64
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: calculation_gen
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge