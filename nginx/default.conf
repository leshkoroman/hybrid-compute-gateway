server {    
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html index.htm;

    client_max_body_size 10000M;

    # Обробка статики (CSS, JS, зображення)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|otf|webp)$ {
        expires 30d;
        access_log off;
        try_files $uri $uri/ =404;
    }

    # Безпека: жорстка заборона доступу до папки bin та всього її вмісту
    location ^~ /bin/ {
        # deny all;
        return 404; 
    }

    # Маршрутизація запитів через Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Обробка PHP-файлів
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Безпека: заборона доступу до прихованих файлів (наприклад, .env, .htaccess)
    location ~ /\. {
        deny all;
    }

    # Увімкнення Gzip для зменшення розміру відповідей
    gzip on;
    gzip_types text/css application/javascript text/javascript application/json text/xml application/xml application/xml+rss text/plain image/svg+xml;
    gzip_vary on;
    gzip_min_length 256;
}